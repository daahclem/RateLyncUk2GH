name: RateLync UK to GH Worker

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: ratelync-uk-gh-worker
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      INGEST_URL: ${{ secrets.INGEST_URL }}
      INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
      HEADLESS: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run worker
        run: node workerukgh.js

      - name: Wait 10 minutes before next run
        if: success()
        run: sleep 300

      - name: Trigger next run
        if: success()
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/ratelync-worker.yml/dispatches \
          -d '{"ref":"main"}'